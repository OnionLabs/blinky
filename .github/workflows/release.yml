name: Release

on:
  push:
    tags: ['v*']

env:
  # espflash v4.x has a Linux compilation bug (nix signal feature, #1015)
  # Pin to 3.3.0 until a v4 release with the fix ships
  ESPFLASH_VERSION: '3.3.0'

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

  package:
    needs: ci
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            rust-target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: linux-arm64
            rust-target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: darwin-arm64
            rust-target: aarch64-apple-darwin
          - os: windows-latest
            target: win32-x64
            rust-target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build extension
        run: npm run compile -- --minify

      # Build espflash from source on each platform
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libudev-dev
          if [ "${{ matrix.rust-target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi

      - name: Build espflash
        shell: bash
        run: |
          if [ "${{ matrix.rust-target }}" = "aarch64-unknown-linux-gnu" ]; then
            # Skip libudev for arm64 cross-build - apt arm64 packages unavailable on x86 runners.
            # espflash uses libudev only for auto port-detection; we always pass --port explicitly.
            cargo install espflash --version ${{ env.ESPFLASH_VERSION }} --no-default-features --features cli --target ${{ matrix.rust-target }} --root ./espflash-out
          else
            cargo install espflash --version ${{ env.ESPFLASH_VERSION }} --target ${{ matrix.rust-target }} --root ./espflash-out
          fi
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Bundle espflash binary
        shell: bash
        run: |
          mkdir -p bin/${{ matrix.target }}
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp ./espflash-out/bin/espflash.exe bin/${{ matrix.target }}/espflash.exe
          else
            cp ./espflash-out/bin/espflash bin/${{ matrix.target }}/espflash
            chmod +x bin/${{ matrix.target }}/espflash
          fi

      - name: Package VSIX
        run: npx vsce package --target ${{ matrix.target }} -o blinky-${{ matrix.target }}.vsix

      - uses: actions/upload-artifact@v7
        with:
          name: vsix-${{ matrix.target }}
          path: '*.vsix'

  release:
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'
          generate_release_notes: true

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --packagePath *.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
