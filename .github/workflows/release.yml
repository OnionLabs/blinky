name: Release

on:
  push:
    tags: ['v*']

env:
  ESPFLASH_VERSION: '4.4.0'

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

  package:
    needs: ci
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            target: linux-x64
            rust-target: x86_64-unknown-linux-gnu
          - os: ubuntu-22.04
            target: linux-arm64
            rust-target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: darwin-arm64
            rust-target: aarch64-apple-darwin
          - os: windows-latest
            target: win32-x64
            rust-target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build extension
        run: npm run compile -- --minify

      # Download official espflash binary for this platform.
      # We previously built from source on every runner, but v4.x publishes
      # prebuilt release assets for all four of our targets — much faster
      # CI and no Rust toolchain / libudev cross-compile setup needed.
      - name: Download espflash
        shell: bash
        run: |
          set -euo pipefail
          ASSET="espflash-${{ matrix.rust-target }}.zip"
          URL="https://github.com/esp-rs/espflash/releases/download/v${ESPFLASH_VERSION}/${ASSET}"
          mkdir -p bin/${{ matrix.target }}
          curl -fsSL "$URL" -o espflash.zip
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            unzip -o espflash.zip -d bin/${{ matrix.target }}
          else
            unzip -o espflash.zip -d bin/${{ matrix.target }}
            chmod +x bin/${{ matrix.target }}/espflash
          fi

      - name: Package VSIX
        run: npx vsce package --target ${{ matrix.target }} -o blinky-${{ matrix.target }}.vsix

      - uses: actions/upload-artifact@v7
        with:
          name: vsix-${{ matrix.target }}
          path: '*.vsix'

  release:
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'
          generate_release_notes: true

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --packagePath *.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
