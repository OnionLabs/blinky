name: Release

on:
  push:
    tags: ['v*']

env:
  ESPFLASH_VERSION: '4.3.0'

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

  package:
    needs: ci
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            rust-target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: darwin-arm64
            rust-target: aarch64-apple-darwin
          - os: windows-latest
            target: win32-x64
            rust-target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build extension
        run: npm run compile -- --minify

      # Build espflash from source on each platform
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libudev-dev

      - name: Build espflash
        run: cargo install espflash --version ${{ env.ESPFLASH_VERSION }} --target ${{ matrix.rust-target }} --root ./espflash-out

      - name: Bundle espflash binary
        shell: bash
        run: |
          mkdir -p bin/${{ matrix.target }}
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp ./espflash-out/bin/espflash.exe bin/${{ matrix.target }}/espflash.exe
          else
            cp ./espflash-out/bin/espflash bin/${{ matrix.target }}/espflash
            chmod +x bin/${{ matrix.target }}/espflash
          fi

      - name: Package VSIX
        run: npx vsce package --target ${{ matrix.target }} -o blinky-${{ matrix.target }}.vsix

      - uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.target }}
          path: '*.vsix'

  release:
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'
          generate_release_notes: true
